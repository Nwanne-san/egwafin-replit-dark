kind = "web"
previewPath = "/"
title = "Egwafin Microfinance Bank"
version = "1.0.0"
id = "artifacts/egwafin-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25890

[services.development]
run = "pnpm --filter @workspace/egwafin-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/egwafin-website", "run", "build" ]
publicDir = "artifacts/egwafin-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25890"
BASE_PATH = "/"
